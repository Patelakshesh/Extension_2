<!DOCTYPE html>
<html>
<head>
    <title>Master Scraper</title>
    <style>
        body { width: 300px; padding: 20px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8f9fa; }
        h3 { margin-top: 0; color: #1a73e8; }
        p { font-size: 14px; color: #555; }
        button { 
            width: 100%; padding: 12px; background-color: #1a73e8; 
            color: white; border: none; border-radius: 6px; 
            cursor: pointer; font-size: 16px; font-weight: bold;
        }
        button:hover { background-color: #1557b0; }
        input[type="number"] {
            width: 100%; padding: 8px; margin-bottom: 15px;
            box-sizing: border-box; border: 1px solid #ccc;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <h3>B2B Master Scraper</h3>
    <p>Target: <b>Google Maps</b></p>
    <p style="font-size: 12px; color: green;">✓ Collects Both (With & Without Website)</p>
    <p style="font-size: 12px; color: red;">✗ Skips if No Phone & No Email</p>
    
    <label for="limit" style="font-size:14px; font-weight:bold;">Number of Leads to Process:</label>
    <input type="number" id="limit" value="150" min="10" max="1000">

    <button id="startScraping">Start Scraping</button>

    <script src="popup.js"></script>
</body>
</html>
